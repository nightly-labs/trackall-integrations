name: CI

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      network: ${{ steps.detect.outputs.network }}
      name: ${{ steps.detect.outputs.name }}
      has_integration: ${{ steps.detect.outputs.has_integration }}
      has_test: ${{ steps.detect.outputs.has_test }}
      local_test_path: ${{ steps.detect.outputs.local_test_path }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - run: bun install --frozen-lockfile  --verbose

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Detect changed integration
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
            HEAD="$PR_HEAD_SHA"
          else
            BASE=$(git rev-parse HEAD^)
            HEAD=$(git rev-parse HEAD)
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          NETWORK=""
          INTEGRATION=""
          while IFS= read -r f; do
            if [[ "$f" =~ ^src/integrations/([^/]+)/([^/]+)/ ]]; then
              NETWORK="${BASH_REMATCH[1]}"
              INTEGRATION="${BASH_REMATCH[2]}"
              break
            fi
          done <<< "$CHANGED"

          LOCAL_TEST_PATH=""
          if [ -n "$NETWORK" ] && [ -f "src/integrations/$NETWORK/$INTEGRATION/index.test.ts" ]; then
            LOCAL_TEST_PATH="src/integrations/$NETWORK/$INTEGRATION/index.test.ts"
          fi

          echo "network=${NETWORK}" >> "$GITHUB_OUTPUT"
          echo "name=${INTEGRATION}" >> "$GITHUB_OUTPUT"
          echo "has_integration=$([ -n "$INTEGRATION" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_test=$([ -n "$LOCAL_TEST_PATH" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "local_test_path=${LOCAL_TEST_PATH}" >> "$GITHUB_OUTPUT"

  test-local:
    needs: detect
    if: needs.detect.outputs.has_test == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - run: bun install --frozen-lockfile

      - name: Run integration test
        id: test
        env:
          INTEGRATION_NETWORK: ${{ needs.detect.outputs.network }}
          INTEGRATION_NAME: ${{ needs.detect.outputs.name }}
          MOVEMENT_INDEXER_URL: ${{ secrets.MOVEMENT_INDEXER_URL }}
          MOVEMENT_RPC_URL: ${{ secrets.MOVEMENT_RPC_URL }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        run: |
          bun test "${{ needs.detect.outputs.local_test_path }}" \
            2>&1 | tee /tmp/test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const output = fs.existsSync('/tmp/test-output.txt')
              ? fs.readFileSync('/tmp/test-output.txt', 'utf8').trim()
              : '(no output)'
            const passed = '${{ steps.test.outputs.exit_code }}' === '0'
            const integration = '${{ needs.detect.outputs.network }}/${{ needs.detect.outputs.name }}'
            const status = passed ? '✅ Passed' : '❌ Failed'
            const marker = '<!-- integration-local-test-result -->'

            const body = [
              marker,
              `## 🧪 Integration Test: \`${integration}\``,
              '',
              `**Status:** ${status}`,
              '',
              '<details>',
              `<summary>Full output</summary>`,
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existing = comments.find(c => c.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

  test-generic:
    needs: detect
    if: needs.detect.outputs.has_integration == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - run: bun install --frozen-lockfile

      - name: Run generic integration test
        id: test
        env:
          INTEGRATION_NETWORK: ${{ needs.detect.outputs.network }}
          INTEGRATION_NAME: ${{ needs.detect.outputs.name }}
          MOVEMENT_INDEXER_URL: ${{ secrets.MOVEMENT_INDEXER_URL }}
          MOVEMENT_RPC_URL: ${{ secrets.MOVEMENT_RPC_URL }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        run: |
          bun test "src/test/run-integration.test.ts" \
            2>&1 | tee /tmp/test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const output = fs.existsSync('/tmp/test-output.txt')
              ? fs.readFileSync('/tmp/test-output.txt', 'utf8').trim()
              : '(no output)'
            const passed = '${{ steps.test.outputs.exit_code }}' === '0'
            const integration = '${{ needs.detect.outputs.network }}/${{ needs.detect.outputs.name }}'
            const status = passed ? '✅ Passed' : '❌ Failed'
            const marker = '<!-- integration-generic-test-result -->'

            const body = [
              marker,
              `## 🧪 Generic Integration Test: \`${integration}\``,
              '',
              `**Status:** ${status}`,
              '',
              '<details>',
              `<summary>Full output</summary>`,
              '',
              '```',
              output,
              '```',
              '',
              '</details>',
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            const existing = comments.find(c => c.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
